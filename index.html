<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cybotech Campus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'pinterest-red': '#E60023',
              'pinterest-red-hover': '#B8001C',
            },
            animation: {
              'fade-in-down': 'fade-in-down 0.5s ease-out forwards',
              'fade-in-up': 'fade-in-up 0.5s ease-out forwards',
              'pulse-cta': 'pulse-cta 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'kenburns': 'kenburns 15s ease-out forwards',
            },
            keyframes: {
              'fade-in-down': {
                '0%': { opacity: '0', transform: 'translateY(-10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              'fade-in-up': {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              'pulse-cta': {
                '0%, 100%': { transform: 'scale(1)', boxShadow: '0 0 0 0 rgba(230, 0, 35, 0.7)' },
                '50%': { transform: 'scale(1.05)', boxShadow: '0 0 0 10px rgba(230, 0, 35, 0)' },
              },
               'kenburns': {
                '0%': { transform: 'scale(1) translate(0, 0)' },
                '100%': { transform: 'scale(1.1) translate(-2%, 2%)' },
              }
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Poppins', sans-serif;
      }
      /* Hide default calendar icon on date inputs with our custom icon */
      .custom-date-icon::-webkit-calendar-picker-indicator {
        display: none;
      }
      /* For Firefox, to remove extra spacing */
      .custom-date-icon {
        -moz-appearance: textfield;
      }
    </style>

  }
}
</script>

</head>
